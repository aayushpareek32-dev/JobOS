llm:
  provider: minimax
  model: MiniMax-M2.7
  base_url: https://api.minimaxi.com/v1
  api_key: YOUR_MINIMAX_API_KEY  # 替换为你的 MiniMax API Key
  max_tokens: 4096
  temperature: 0.7

search:
  default_location: 武汉
  default_keywords:
    - AI Agent
    - 大模型
    - LLM
    - NLP
    - 人工智能
  job_types:
    - 日常实习
    - 暑期实习
  platforms:
    - boss
    - nowcoder
    - liepin
    - zhilian

scoring:
  weights:
    role_match: 0.20        # 门槛
    skill_alignment: 0.20   # 门槛
    salary: 0.10
    location: 0.10
    company_stage: 0.08
    tech_stack: 0.08
    growth_potential: 0.08
    interview_difficulty: 0.06
    timeline_match: 0.05
    work_life_balance: 0.05
  gate_threshold: 0.4

resume:
  latex_engine: xelatex
  template: llm_agent
  output_dir: data/outputs

scheduler:
  batch_start_hour: 22
  batch_end_hour: 6
  interval_minutes: 30

notifications:
  discord_webhook: ""
  wechat_webhook: ""
